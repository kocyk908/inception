services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -p$${DB_ROOT_PW} || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 10

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    restart: unless-stopped
    env_file: .env
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    healthcheck:
      test: ["CMD-SHELL", "[ -f /var/www/html/wp-config.php ] || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 15

  nginx:
    build: ./requirements/nginx
    container_name: nginx
    restart: unless-stopped
    env_file: .env
    depends_on:
      wordpress:
        condition: service_healthy
    ports:
      - "443:443"
    volumes:
      - wp_data:/var/www/html:ro
    networks:
      - inception

networks:
  inception:
    name: ${NETWORK}

volumes:
  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}/wp

  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}/db
